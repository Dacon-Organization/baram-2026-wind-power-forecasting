name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    uses: Dacon-Organization/.github/.github/workflows/reusable-python-ci.yml@d94297dd6fc4710ea8299e8042bae48bca72c5a5 # central v1
    permissions:
      contents: read
    with:
      python-versions: '["3.11"]'
      requirements-file: requirements-ci.txt
      test-command: python -m pytest -q
      notebook-command: python scripts/check_notebook_integrity.py
      run-ruff: false
      run-ruff-format: false

  docs:
    name: 문서
    uses: Dacon-Organization/.github/.github/workflows/reusable-docs-ci.yml@d94297dd6fc4710ea8299e8042bae48bca72c5a5 # central v1
    permissions:
      contents: read

  policy:
    name: PR 정책
    if: ${{ github.event_name == 'pull_request' }}
    uses: Dacon-Organization/.github/.github/workflows/reusable-pr-policy.yml@d94297dd6fc4710ea8299e8042bae48bca72c5a5 # central v1
    permissions: {}

  dependency-review:
    name: 의존성 검토
    if: ${{ github.event_name == 'pull_request' }}
    uses: Dacon-Organization/.github/.github/workflows/reusable-dependency-review.yml@d94297dd6fc4710ea8299e8042bae48bca72c5a5 # central v1
    permissions:
      contents: read
    with:
      bootstrap-mode: ${{ github.event.pull_request.base.sha == '0669babb64f17f63062f97b1cb9495a66ac07c79' }}

  ci-gate:
    name: CI / gate
    if: ${{ always() }}
    needs: [python, docs]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: 결과 집계
        shell: bash
        env:
          PYTHON_RESULT: ${{ needs.python.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          test "$PYTHON_RESULT" = "success"
          test "$DOCS_RESULT" = "success"

  policy-gate:
    name: PR Policy / gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [policy]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - env:
          POLICY_RESULT: ${{ needs.policy.result }}
        run: test "$POLICY_RESULT" = "success"

  dependency-review-gate:
    name: Dependency Review / gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [dependency-review]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - env:
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
        run: test "$DEPENDENCY_RESULT" = "success"
