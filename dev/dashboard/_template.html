<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARAM 작업 로그</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1115; color: #e6e9ef; line-height: 1.65; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 36px 20px 64px; }
  a { color: #58a6ff; }
  h1 { margin: 0 0 6px; font-size: 1.7rem; }
  h2 { color: #58a6ff; font-size: 1.05rem; margin-top: 28px; }
  .sub { color: #8b93a7; margin-bottom: 24px; }
  .panel { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 12px; padding: 16px 20px; }
  li { margin: 6px 0; }
  code { background: #0b0d11; padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>작업명</h1>
  <div class="sub">YYYY-MM-DD KST · branch</div>
  <div class="panel">
    <h2>완료</h2>
    <ul>
      <li>작업 내용</li>
    </ul>
    <h2>검증</h2>
    <ul>
      <li>검증 내용</li>
    </ul>
    <h2>다음</h2>
    <ul>
      <li>다음 작업</li>
    </ul>
  </div>
</div>
</body>
</html>
